# analyst_rubric.yaml — рубрика «пользы» для авто-анализатора репо/сайтов (v3)
# Правится без кода. Используется auto_analyst.py: mimo оценивает каждый критерий 0-10,
# Python считает взвешенный итог (детерминированно). Решение о внедрении — всегда за yaromat.

version: 3

# ── Жёсткие отсечки: если ИСТИНА — auto-skip, smoke-test НЕ запускается ───────────
hard_rejects:
  - id: needs_heavy_hw
    desc: "Требует GPU / тяжёлого железа на буке (Atom/1.8GB) и нет облачного/лёгкого пути"
  - id: tos_violation
    desc: "Нарушает ToS (VLESS/VPN/обход блокировок и т.п.)"
  - id: dead_and_no_concept
    desc: "Заброшен и сломан И при этом без концептуальной ценности"
  - id: paid_monolith
    desc: "Платный-только И непрепарируемый (монолит без бесплатного ядра)"
# Прим.: «не наша область» БОЛЬШЕ НЕ отсечка — уходит в скоринг через ценность идеи/концепции.

# ── Взвешенный скор (сумма весов = 100). mimo даёт 0-10 на критерий ───────────────
criteria:
  relevance:        {weight: 18, desc: "Прямое попадание в стек: медиа-ген/обработка, видео/аудио, паблишинг, агенты/LLM, источники, аналитика"}
  dissectability:   {weight: 15, desc: "ПРЕПАРИРУЕМОСТЬ: можно разобрать на части, вытащить нужное, откинуть лишнее/платное; модульность vs монолит"}
  uniqueness:       {weight: 14, desc: "Уникальность/рычаг: возможность, которой нет, или явно лучше текущего"}
  concept_value:    {weight: 14, desc: "ЦЕННОСТЬ ИДЕИ: продукт не подходит напрямую, но идея/подход/паттерн переносится к нам (как X-пост)"}
  price:            {weight: 11, desc: "Бесплатно / near-free"}
  runs_in_env:      {weight: 11, desc: "Запускается в нашей среде: Linux/GH Actions, без платной инфры"}
  integration_cost: {weight: 7,  desc: "Стоимость интеграции: чёткий CLI/API vs тяжёлый фреймворк (выше балл = дешевле)"}
  ru_access:        {weight: 4,  desc: "RU-доступность: не заблокирован без воркера/раннера"}
  health:           {weight: 3,  desc: "Здоровье проекта: свежие коммиты/звёзды"}
  license:          {weight: 3,  desc: "Лицензия пермиссивная (вес снижен — препарируемость важнее)"}

# ── Пороги и роутинг ──────────────────────────────────────────────────────────────
thresholds:
  smoke_test: 60      # инструментальный скор >= → smoke-test в песочнице + вердикт «стоит попробовать»
  watch: 40           # 40-59 → «на заметку», без теста
  # < watch → скип с причиной
  concept_note: 7     # если concept_value (0-10) >= → выдать концепт-заметку НЕЗАВИСИМО от инстр.скора

# ── Контекст нашей архитектуры (для оценки рисков внедрения) ──────────────────────
# Скармливается mimo, чтобы он оценил риск перегруза связей и устойчивости.
architecture_context: |
  Контент-фабрика yaromat (электронная музыка, Future Garage/Downtempo).
  Узлы и связи:
  - Бук (Atom CPU, 1.8GB RAM, Linux) — слабый; тяжёлый рендер НЕ тут, только на GH Actions.
  - GH Actions (render-репо mat3213-render) — вся тяжёлая работа: рендер клипов (CLIP_PRODUCER/
    FULL_RENDER), генерация (Qwen/Hunyuan/VeoFree/CF Workers AI), Style Scout, mimo CI.
  - ЯД (rclone ydrive:) — единое хранилище/шина: треки, пулы, очереди, отчёты, auth.
  - CF Worker — обход RU-блока Telegram (api.telegram.org заблокирован с RU-IP).
  - Публикация — ТОЛЬКО из очереди publish_from_queue.py по cron (TG/VK/OK/Pinterest/YouTube).
  - mimo agent (free-client) — бесплатный исполнитель: локально на буке, на GH Actions, на Windows.
  - fanout.py — оркестр fan-out на бесплатных воркеров (gh/mimo-local/gh-mimo/mimo-win).
  Принципы: бесплатность, экономия токенов Claude, не нагружать бук, всё тяжёлое на GH,
  публикация только через очередь, ничего не публиковать/деплоить без апрува yaromat.
  Риск ПЕРЕГРУЗА СВЯЗЕЙ = новый инструмент добавляет много новых зависимостей/точек отказа,
  пересекается с существующими узлами, усложняет шину ЯД/очереди/cron.
  Риск УСТОЙЧИВОСТИ = инструмент хрупкий (внешний платный API, частые поломки, нестабильный
  upstream, ломает что-то при сбое, тянет бук/раннер).
