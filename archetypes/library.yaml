# Библиотека архетипов для драматургии клипов yaromat
# Каждый архетип = шаблон treatment.json: логлайн-паттерн, мотив, дуга, beats
# Сценарист ВЫБИРАЕТ архетип → наполняет конкретикой трека
#
# Формат совместим с screenwriter.py (treatment.json):
#   logline, central_motif, emotional_curve, beats[], avoid[]
#
# Использование:
#   1. mimo/скрипт берёт эмоцию трека + BPM → match по emotional_profile
#   2. Подставляет шаблон beats в промпт сценариста
#   3. Сценарист наполняет конкретикой (мотив трека, визуальные cue)
#
# Правила:
#   - Без лиц. «Герой» = объект/стихия/пространство
#   - Мотив обязан вернуться ≥3 раза (hook, body, outro)
#   - Каждый beat: intent → visual → imagery_cues → pacing → scale

archetypes:
  # ═══════════════════════════════════════════════════════════════════
  # 1. СТИХИИ И ПРИРОДА
  # ═══════════════════════════════════════════════════════════════════

  - id: dissolution
    name: Растворение
    emotional_profile: выгорание → тишина → покой
    energy: low
    description: >
      Объект постепенно теряет форму — тает, размывается, рассыпается.
      Не трагедия, а неизбежный переход в другое состояние.
    central_motif_pattern: "вода/лёд/туман/свет — растворяющийся объект"
    hero_object: свеча, лёд, туман, стекло с дождём
    beats:
      - section: intro
        intent: "установить объект в его целостности"
        visual: "объект один, статичен, окружён пустотой"
        imagery_cues: ["крупный план объекта", "тишина вокруг", "свет мягкий, ровный"]
        pacing: slow
        scale: macro
      - section: body
        intent: "начало растворения — первые признаки изменения"
        visual: "появляются трещины/капли/туман, объект начинает меняться"
        imagery_cues: ["капля с края", "туман сквозь щель", "свет мерцает"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "массовое растворение — объект теряет форму"
        visual: "вода течёт, туман заполняет кадр, свет гаснет"
        imagery_cues: ["поток", "объект размывается", "границы исчезают"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "после — пустота или новая форма"
        visual: "остатки, лужа, туман стелется, тишина"
        imagery_cues: ["след на стекле", "капля на поверхности", "пустое пространство"]
        pacing: slow
        scale: wide

  - id: awakening
    name: Пробуждение
    emotional_profile: тишина → нарастание → озарение
    energy: medium
    description: >
      Объект/пространство медленно оживает — свет проникает, движение начинается,
      мир вокруг наполняется энергией. Не взрыв, а постепенное пробуждение.
    central_motif_pattern: "свет проникает в тёмное пространство"
    hero_object: комната, окно, лес на рассвете, замёрзшее озеро
    beats:
      - section: intro
        intent: "тьма/тишина/спячка"
        visual: "тёмное пространство, едва различимые контуры"
        imagery_cues: ["чёрный кадр с еле видимым контуром", "тишина", "холод"]
        pacing: slow
        scale: wide
      - section: body
        intent: "первые проблески — свет/движение/звук"
        visual: "луч света, первое движение, звук проникает"
        imagery_cues: ["щель в ставне", "первый луч", "пылинки в свете"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "пробуждение — свет заполняет, мир оживает"
        visual: "пространство раскрывается, детали становятся видны"
        imagery_cues: ["свет заливает", "движение в тенях", "мир открывается"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "мир проснулся — новый день/состояние"
        visual: "светлый кадр, движение продолжается, но спокойно"
        imagery_cues: ["свет стелется", "последние тени уходят", "тишина другого рода"]
        pacing: slow
        scale: medium

  - id: descent
    name: Падение
    emotional_profile: высота → страх → столкновение → тишина
    energy: high→low
    description: >
      Объект/пространство обрушивается или погружается вниз. Не катастрофа,
      а медленное, неизбежное движение вниз — как лист, как солнце, как вода в стоке.
    central_motif_pattern: "движение вниз — гравитация, погружение, обвал"
    hero_object: лист, вода в стоке, солнце за горизонт, пыль в воздухе
    beats:
      - section: intro
        intent: "высота — объект на вершине, мир расстилается внизу"
        visual: "вид сверху, объект на краю, горизонт далеко"
        imagery_cues: ["панорама с высоты", "объект на грани", "ветер"]
        pacing: slow
        scale: wide
      - section: body
        intent: "начало падения — первое движение вниз"
        visual: "объект срывается/сдвигается/погружается"
        imagery_cues: ["лифт едет вниз", "капля отрывается", "листья падают"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "пик падения — скорость, столкновение"
        visual: "быстрое движение вниз, столкновение с поверхностью"
        imagery_cues: ["вода бьёт о дно", "пыль взмывает", "стекло трескается"]
        pacing: fast
        scale: macro
      - section: outro
        intent: "после столкновения — оседание, тишина"
        visual: "пыль оседает, вода успокаивается, объект на дне"
        imagery_cues: ["осевшая пыль", "тихая вода", "объект неподвижен"]
        pacing: slow
        scale: wide

  - id: flood
    name: Наводнение
    emotional_profile: тревога → нарастание → подъём → затишье
    energy: medium→high→low
    description: >
      Вода (или другой элемент) медленно поднимается, заполняя пространство.
      Не катастрофа, а неизменный процесс — как прилив, как дождь в подвале.
    central_motif_pattern: "вода поднимается — заполняет, вытесняет, покрывает"
    hero_object: комната, ступеньки, окно, дерево в поле
    beats:
      - section: intro
        intent: "сухо — пространство до воды, норма"
        visual: "сухое пространство, первые капли, запах дождя"
        imagery_cues: ["первые капли на стекле", "тёмные тучи", "тишина перед дождём"]
        pacing: slow
        scale: wide
      - section: body
        intent: "вода поднимается — первый уровень, потом выше"
        visual: "вода покрывает пол, ступеньки, поднимается к окну"
        imagery_cues: ["вода на ступеньках", "отражения в луже", "уровень растёт"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "вода на максимуме — пространство заполнено"
        visual: "вода у окна, мир под водой, тишина под поверхностью"
        imagery_cues: ["подводный мир", "воздушные пузыри", "свет сквозь воду"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "вода отступает — следы, осадок, новая норма"
        visual: "следы воды на стенах, мокрые предметы, тишина"
        imagery_cues: ["линия воды на стене", "мокрый песок", "следы на стекле"]
        pacing: slow
        scale: medium

  - id: storm
    name: Буря
    emotional_profile: затишье → нарастание → хаос → затишье
    energy: low→high→low
    description: >
      Стихия обрушивается на объект/пространство. Не разрушение,
      а столкновение с силой, которая больше объекта.
    central_motif_pattern: "ветер/дождь/свет — стихия vs объект"
    hero_object: дерево, фонарь, стекло, провода
    beats:
      - section: intro
        intent: "тишина перед бурей — объект спокоен"
        visual: "объект неподвижен, воздух тяжёлый, тишина"
        imagery_cues: ["листья не шевелятся", "стекло чистое", "тишина"]
        pacing: slow
        scale: medium
      - section: body
        intent: "буря начинается — первые порывы"
        visual: "ветер сгибает, дождь стучит, свет мерцает"
        imagery_cues: ["порыв ветра", "капли на стекле", "тень мелькает"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "буря в полную силу — хаос"
        visual: "ветер ломает, дождь льёт, мир трясёт"
        imagery_cues: ["дерево гнётся", "стекло трескается", "вода хлещет"]
        pacing: fast
        scale: wide
      - section: outro
        intent: "буря ушла — тишина, мокрый мир"
        visual: "тишина, капли, мокрые поверхности, свет возвращается"
        imagery_cues: ["последние капли", "лужи", "прозрачный воздух"]
        pacing: slow
        scale: wide

  # ═══════════════════════════════════════════════════════════════════
  # 2. ОБЪЕКТЫ И ПРОСТРАНСТВА
  # ═══════════════════════════════════════════════════════════════════

  - id: forgotten_room
    name: Забытая комната
    emotional_profile: любопытство → исследование → откровение → ностальгия
    energy: low
    description: >
      Камера исследует заброшенное пространство. Не страх, а нежность к тому,
      что осталось — пыль, следы, предметы, которые ждут.
    central_motif_pattern: "пыль, свет в пыли, следы присутствия"
    hero_object: комната, окно, полка с вещами, зеркало
    beats:
      - section: intro
        intent: "вход в пространство — дверь, коридор, первый взгляд"
        visual: "дверь приоткрыта, свет из щели, тишина"
        imagery_cues: ["щель двери", "пыль в луче света", "тихий скрип"]
        pacing: slow
        scale: medium
      - section: body
        intent: "исследование — детали, следы, история"
        visual: "крупные планы предметов, пыль, трещины, следы"
        imagery_cues: ["предмет на полке", "след пальца на пыли", "треснутое стекло"]
        pacing: slow
        scale: macro
      - section: climax
        intent: "главное открытие — окно, свет, суть空间"
        visual: "окно раскрывается, свет заливает, комната оживает"
        imagery_cues: ["свет из окна", "пыль танцует", "комната видна полностью"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "уход — комната остаётся, мы уносим что-то"
        visual: "дверь закрывается, тень, тишина"
        imagery_cues: ["дверь", "последний луч", "пыль оседает"]
        pacing: slow
        scale: medium

  - id: transit
    name: Транзит
    emotional_profile: ожидание → движение → прибытие/неприбытие
    energy: medium
    description: >
      Объект/пространство в движении — поезд, лифт, коридор. Не назначение,
      а само движение как состояние. Ожидание без конца.
    central_motif_pattern: "окно движущегося транспорта — мир за стеклом"
    hero_object: окно поезда, коридор, эскалатор, тоннель
    beats:
      - section: intro
        intent: "ожидание на перроне — мир стоит"
        visual: "пустой перрон, тишина, свет фонарей"
        imagery_cues: ["пустая платформа", "свет в тумане", "тишина"]
        pacing: slow
        scale: wide
      - section: body
        intent: "движение — мир за стеклом мелькает"
        visual: "окно, пейзаж за стеклом, отражение"
        imagery_cues: ["деревья мелькают", "отражение в стекле", "тени"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "туннель/мост/пик движения"
        visual: "тьма тоннеля, свет мелькает, скорость"
        imagery_cues: ["туннель", "огни мелькают", "скорость"]
        pacing: fast
        scale: medium
      - section: outro
        intent: "прибытие или вечное движение"
        visual: "поезд останавливается / движение продолжается"
        imagery_cues: ["платформа", "двери открываются / тоннель"]
        pacing: slow
        scale: wide

  - id: mirror
    name: Зеркало
    emotional_profile: узнавание → искажение → разрушение отражения
    energy: medium→high
    description: >
      Отражение в зеркале/воде/стекле — сначала точное, потом искажается,
      трескается, растворяется. Идентичность под вопросом.
    central_motif_pattern: "отражение — точное → искажённое → разрушенное"
    hero_object: зеркало, лужа, стекло, металлическая поверхность
    beats:
      - section: intro
        intent: "точное отражение — мир как есть"
        visual: "зеркало чистое, отражение ясное, статично"
        imagery_cues: ["зеркало", "идеальное отражение", "стеклянная поверхность"]
        pacing: slow
        scale: medium
      - section: body
        intent: "искажение — отражение меняется"
        visual: "трескается, рябит, элементы меняются"
        imagery_cues: ["треснутое стекло", "рябь на воде", "отражение дрожит"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "разрушение — зеркало/стекло/вода ломается"
        visual: "стекло разбивается, вода всколыхивается, отражение исчезает"
        imagery_cues: ["осколки", "капли летят", "поверхность рвётся"]
        pacing: fast
        scale: macro
      - section: outro
        intent: "осколки/следы — отражение исчезло"
        visual: "осколки на полу, мутная вода, пустая рама"
        imagery_cues: ["осколки", "мутная поверхность", "пустота"]
        pacing: slow
        scale: wide

  - id: threshold
    name: Порог
    emotional_profile: колебание → решение → шаг → неизвестность
    energy: medium
    description: >
      Объект/пространство на границе — дверь, мост, край. Не решимость,
      а сам момент выбора, когда оба мира ещё видны.
    central_motif_pattern: "дверь/мост/край — два пространства, одно решение"
    hero_object: дверь, мост, порог, обрыв
    beats:
      - section: intro
        intent: "на одной стороне — familiar world"
        visual: "привычное пространство, объект стоит перед дверью/мостом"
        imagery_cues: ["дверь закрыта", "amiliar space", "тишина"]
        pacing: slow
        scale: medium
      - section: body
        intent: "колебание — объект у порога, оба мира видны"
        visual: "дверь приоткрыта, свет из щели, тень на пороге"
        imagery_cues: ["щель двери", "два света", "тень на пороге"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "шаг через порог"
        visual: "дверь открывается / объект пересекает границу"
        imagery_cues: ["дверь распахивается", "шаг", "пространство раскрывается"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "на другой стороне — новый мир"
        visual: "новое пространство, старое исчезает"
        imagery_cues: ["новый свет", "старая дверь за спиной", "неизвестность"]
        pacing: slow
        scale: wide

  - id: erosion
    name: Эрозия
    emotional_profile: твёрдость → постепенное стирание → обнажение
    energy: low
    description: >
      Объект медленно стирается — ветром, водой, временем. Не разрушение,
      а постепенное обнажение того, что внутри.
    central_motif_pattern: "ветер/вода/время стирают поверхность"
    hero_object: камень, стена, дерево, металл
    beats:
      - section: intro
        intent: "объект цел — поверхность гладкая, форма ясная"
        visual: "объект в полном виде, поверхность ровная"
        imagery_cues: ["камень", "гладкая поверхность", "цельный объект"]
        pacing: slow
        scale: macro
      - section: body
        intent: "начало стирания — первые следы"
        visual: "трещины, сколы, следы ветра/воды"
        imagery_cues: ["трещина", "скол", "след на поверхности"]
        pacing: slow
        scale: macro
      - section: climax
        intent: "поверхность стёрта — обнажена суть"
        visual: "внутренний слой виден, форма изменилась"
        imagery_cues: ["внутренняя текстура", "новая форма", "обнажённая суть"]
        pacing: medium
        scale: macro
      - section: outro
        intent: "остатки — объект изменился навсегда"
        visual: "новая форма, осколки вокруг, тишина"
        imagery_cues: ["изменившийся объект", "пыль", "следы"]
        pacing: slow
        scale: medium

  # ═══════════════════════════════════════════════════════════════════
  # 3. СВЕТ И ТЕНЬ
  # ═══════════════════════════════════════════════════════════════════

  - id: fading_light
    name: Уходящий свет
    emotional_profile: тепло → угасание → тьма
    energy: medium→low
    description: >
      Свет медленно уходит из пространства — не закат, а именно угасание.
      Лампа гаснет, свеча догорает, окно темнеет. Мир сжимается.
    central_motif_pattern: "свет = присутствие; тьма = отсутствие"
    hero_object: лампа, свеча, окно на закате, фонарь
    beats:
      - section: intro
        intent: "свет есть — мир освещён, тепло"
        visual: "яркий свет, объект в свете, тени мягкие"
        imagery_cues: ["лампа горит", "свет из окна", "тёплые тона"]
        pacing: slow
        scale: medium
      - section: body
        intent: "свет减弱 — тени растут, пространство сжимается"
        visual: "свет мерцает, тени удлиняются, углы темнеют"
        imagery_cues: ["мерцание", "длинные тени", "тёмные углы"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "последний свет — критическая точка"
        visual: "одна точка света, мир вокруг чёрный"
        imagery_cues: ["одна свеча", "последний луч", "тьма давит"]
        pacing: slow
        scale: macro
      - section: outro
        intent: "тьма — свет ушёл"
        visual: "чёрный кадр, едва различимые контуры"
        imagery_cues: ["тьма", "контур объекта", "тишина"]
        pacing: slow
        scale: wide

  - id: light_through
    name: Свет сквозь
    emotional_profile: преграда → проникновение → трансформация
    energy: medium
    description: >
      Свет пробивается сквозь преграду — стекло, ткань, дерево, туман.
      Не разрушение преграды, а проникновение сквозь неё.
    central_motif_pattern: "свет = сила, преграда = форма, результат = узор"
    hero_object: окно, ткань на ветру, листва, туман
    beats:
      - section: intro
        intent: "преграда — свет за ней, но не сквозь"
        visual: "стекло/ткань/стена, за ней свет, но мы с тёмной стороны"
        imagery_cues: ["стекло матовое", "ткань закрывает", "тьма перед светом"]
        pacing: slow
        scale: medium
      - section: body
        intent: "свет начинает проникать — щели, прорехи"
        visual: "лучи сквозь щели, узоры на полу, проекции"
        imagery_cues: ["луч сквозь щель", "узор на полу", "проекция"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "свет заливает сквозь — трансформация пространства"
        visual: "пространство наполнено светом, преграда стала фильтром"
        imagery_cues: ["свет заливает", "узоры танцуют", "пространство светлое"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "свет стал частью пространства"
        visual: "свет и тень в балансе, узор статичен"
        imagery_cues: ["светлые полосы", "тихий узор", "баланс"]
        pacing: slow
        scale: medium

  - id: shadow_play
    name: Игра теней
    emotional_profile: знакомство → манипуляция → тень отдельно от объекта
    energy: medium→high
    description: >
      Тень объекта становится самостоятельным персонажем — двигается отдельно,
      растёт, уходит, живёт своей жизнью.
    central_motif_pattern: "тень ≠ объект; тень = отдельный мир"
    hero_object: дерево, столб, провода, каркас здания
    beats:
      - section: intro
        intent: "объект и тень совпадают — норма"
        visual: "объект и его тень, они вместе, движутся синхронно"
        imagery_cues: ["дерево и тень", "столб и полоса", "норма"]
        pacing: slow
        scale: medium
      - section: body
        intent: "тень начинает жить отдельно"
        visual: "тень двигается не так, как объект, появляется разрыв"
        imagery_cues: ["тень отстаёт", "тень уходит", "разрыв объект-тень"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "тень обретает форму — самостоятельный мир"
        visual: "тень = отдельный объект, живёт своей жизнью"
        imagery_cues: ["тень двигается одна", "тень больше объекта", "тень —主角"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "тень уходит или сливается обратно"
        visual: "тень исчезает / возвращается к объекту"
        imagery_cues: ["тень растворяется", "объект один", "норма другого рода"]
        pacing: slow
        scale: medium

  - id: neon_absence
    name: Отсутствие неона
    emotional_profile: ожидание → дефицит → наслаждение простым
    energy: low
    description: >
      НЕ неон (запрещён!), а его отсутствие — тусклый свет, приглушённые тона,
      одинокий фонарь в тумане. Красота в дефиците света.
    central_motif_pattern: "мало света — каждый луч значим"
    hero_object: фонарь в тумане, свеча, экран телефона в темноте
    beats:
      - section: intro
        intent: "почти тьма — одинокий источник"
        visual: "один источник света в темноте, туман"
        imagery_cues: ["фонарь в тумане", "одна точка света", "тьма"]
        pacing: slow
        scale: wide
      - section: body
        intent: "свет исследует пространство — тускло, но достаточно"
        visual: "свет скользит по стенам, объекты появляются из тьмы"
        imagery_cues: ["свет на стене", "предметы в полумраке", "тени"]
        pacing: slow
        scale: medium
      - section: climax
        intent: "момент яркости — вспышка, потом снова тускло"
        visual: "один момент полного света, потом возврат к приглушённому"
        imagery_cues: ["вспышка", "ослепление", "возврат к тусклому"]
        pacing: medium
        scale: macro
      - section: outro
        intent: "тьма принимает — свет не нужен"
        visual: "тьма как покой, объект в темноте, спокоен"
        imagery_cues: ["тьма", "контур", "спокойствие"]
        pacing: slow
        scale: wide

  - id: golden_hour
    name: Золотой час
    emotional_profile: красота → хрупкость → уход
    energy: medium→low
    description: >
      Момент перед закатом — мир окрашен в золото, всё красиво, но хрупко.
      Знаешь, что через 10 минут будет по-другому. Нежность к моменту.
    central_motif_pattern: "золотой свет = хрупкость, красота, прощание"
    hero_object: поле, окно на закате, город с крыш, дерево в свете
    beats:
      - section: intro
        intent: "золотой свет заливает — мир прекрасен"
        visual: "золотой свет, длинные тени, всё温暖"
        imagery_cues: ["золотой свет", "длинные тени", "тёплые тона"]
        pacing: slow
        scale: wide
      - section: body
        intent: "мир в золоте — деталиBecome beautiful"
        visual: "крупные планы в золотом свете, текстуры"
        imagery_cues: ["крупный план", "золотой свет на текстуре", "тепло"]
        pacing: medium
        scale: macro
      - section: climax
        intent: "последний момент золота — пик красоты"
        visual: "максимальное золото, всё окрашено, хрупко"
        imagery_cues: ["пик золота", "всё в свете", "хрупкость"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "свет уходит — мир меняется"
        visual: "золото сменяется синевой, тени поглощают"
        imagery_cues: ["холодней", "синева", "мир изменился"]
        pacing: slow
        scale: wide

  # ═══════════════════════════════════════════════════════════════════
  # 4. ДВИЖЕНИЕ И ВРЕМЯ
  # ═══════════════════════════════════════════════════════════════════

  - id: loop
    name: Петля
    emotional_profile: начало → движение → возврат → осознание
    energy: medium
    description: >
      Событие/движение повторяется, но каждый раз немного иначе.
      Петля не зациклена — она спираль. Каждый круг = новое понимание.
    central_motif_pattern: "повтор с вариацией — не замкнутая петля, а спираль"
    hero_object: колесо, маятник, волна, луна (фазы)
    beats:
      - section: intro
        intent: "первый круг — движение начинается"
        visual: "объект в движении, мы видим первый проход"
        imagery_cues: ["колесо крутится", "волна идёт", "маятник"]
        pacing: medium
        scale: medium
      - section: body
        intent: "второй-третий круг — повтор с вариацией"
        visual: "то же движение, но детали меняются"
        imagery_cues: ["тот же кадр, но свет другой", "повтор с вариацией"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "петля ломается — движение уходит за пределы"
        visual: "объект выходит за рамки петли,一个新的轨迹"
        imagery_cues: ["петля рвётся", "траектория меняется", "нewый путь"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "осознание — петля была спиралью"
        visual: "вид сверху на спираль / движение продолжается по-новому"
        imagery_cues: ["спираль", "новый круг", "продолжение"]
        pacing: slow
        scale: wide

  - id: freeze
    name: Заморозка
    emotional_profile: движение → остановка → тишина → возобновление
    energy: high→low→medium
    description: >
      Мир замедляется и останавливается — не стоп-кадр, а лёд, ступор,
      задержка дыхания. Потом — медленное возобновление.
    central_motif_pattern: "движение → замедление → стоп → возобновление"
    hero_object: капля воды, пылинка, лист, человек (спина/руки)
    beats:
      - section: intro
        intent: "мир движется — нормальная скорость"
        visual: "объект в движении, мир вокруг живой"
        imagery_cues: ["капля падает", "пылинки летят", "лист крутится"]
        pacing: medium
        scale: medium
      - section: body
        intent: "замедление — мир замедляется, деталиBecome видны"
        visual: "замедленное движение, каждая деталь видна"
        imagery_cues: ["капля зависает", "пылинки стоят", "лист завис"]
        pacing: slow
        scale: macro
      - section: climax
        intent: "стоп — мир заморожен"
        visual: "абсолютная неподвижность, тишина"
        imagery_cues: ["стоп", "неподвижность", "тишина"]
        pacing: slow
        scale: medium
      - section: outro
        intent: "возобновление — мир оживает"
        visual: "медленное движение, потом нормальная скорость"
        imagery_cues: ["первое движение", "оживание", "продолжение"]
        pacing: medium→slow
        scale: medium

  - id: time_lapse
    name: Таймлапс
    emotional_profile: момент → ускорение → сжатие времени
    energy: low→high
    description: >
      Время ускоряется — облака мчатся, тени бегут, цветы раскрываются и вянут.
      Не таймлапс как приём, а опыт ускоренного времени.
    central_motif_pattern: "время как река — ускоренное, но течение видно"
    hero_object: небо, растение, город, тень от солнца
    beats:
      - section: intro
        intent: "нормальное время — один момент"
        visual: "стоп-кадр или медленное движение, нормальный мир"
        imagery_cues: ["неподвижное небо", "стоп-кадр", "тишина"]
        pacing: slow
        scale: wide
      - section: body
        intent: "ускорение — время набирает скорость"
        visual: "облака мчатся, тени бегут, мир меняется"
        imagery_cues: ["облака летят", "тени бегут", "цветок раскрывается"]
        pacing: fast
        scale: wide
      - section: climax
        intent: "максимум — время сжато, мир меняется на глазах"
        visual: "день-ночь-день, мир меняется кардинально"
        imagery_cues: ["сутки за секунду", "цветок раскрывается-увядает", "город меняется"]
        pacing: fast
        scale: wide
      - section: outro
        intent: "замедление — время возвращается"
        visual: "мир замедляется, остановка на моменте"
        imagery_cues: ["замедление", "момент", "тишина"]
        pacing: medium→slow
        scale: medium

  - id: drift
    name: Дрейф
    emotional_profile: покой → медленное движение → неизвестность
    energy: low
    description: >
      Объект плывёт без цели — в воде, в воздухе, в пространстве.
      Не движение к чему-то, а сам процесс дрейфа. Медленно, неизбежно.
    central_motif_pattern: "бесцельное движение — объект там, где его несёт"
    hero_object: лодка, лист на воде, облако, пылинка в луче
    beats:
      - section: intro
        intent: "объект неподвижен / начинает дрейф"
        visual: "объект на месте, потом первое движение"
        imagery_cues: ["лодка у берега", "лист на воде", "тишина"]
        pacing: slow
        scale: medium
      - section: body
        intent: "дрейф — объект плывёт, мир меняется вокруг"
        visual: "объект движется, фон меняется, течение несёт"
        imagery_cues: ["течение", "объект плывёт", "фон меняется"]
        pacing: slow
        scale: wide
      - section: climax
        intent: "пик дрейфа — объект в открытом пространстве"
        visual: "объект далеко от берега, один в пространстве"
        imagery_cues: ["открытая вода", "один объект", "горизонт"]
        pacing: slow
        scale: wide
      - section: outro
        intent: "объект уплывает / приплывает / продолжает дрейф"
        visual: "объект уменьшается / приближается / продолжает"
        imagery_cues: ["объект далеко", "горизонт", "продолжение"]
        pacing: slow
        scale: wide

  # ═══════════════════════════════════════════════════════════════════
  # 5. АБСТРАКТНЫЕ И ЭМОЦИОНАЛЬНЫЕ
  # ═══════════════════════════════════════════════════════════════════

  - id: lost_signal
    name: Потерянный сигнал
    emotional_profile: связь → помехи → потеря → тишина
    energy: medium→low
    description: >
      Связь обрывается — радио шумит, экран мутнеет, звук пропадает.
      Не катастрофа, а постепенная потеря контакта с чем-то важным.
    central_motif_pattern: "помехи = потеря связи; тишина = отсутствие"
    hero_object: радио, экран, провода, антенна
    beats:
      - section: intro
        intent: "связь есть — сигнал чистый, мир ясен"
        visual: "экран чистый, звук ясный, объект работает"
        imagery_cues: ["экран", "чистый звук", "работающий объект"]
        pacing: slow
        scale: medium
      - section: body
        intent: "помехи — сигнал деградирует, появляется шум"
        visual: "экран мутнеет, звук искажается, помехи"
        imagery_cues: ["статика", "помехи на экране", "шум"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "потеря — сигнал обрывается"
        visual: "экран гаснет, звук обрывается, тишина"
        imagery_cues: ["чёрный экран", "тишина", "пустота"]
        pacing: slow
        scale: macro
      - section: outro
        intent: "тишина — объект молчит"
        visual: "неподвижный экран, тишина, объект без сигнала"
        imagery_cues: ["неподвижный экран", "тишина", "пустота"]
        pacing: slow
        scale: medium

  - id: echo
    name: Эхо
    emotional_profile: звук → повтор → искажение → затухание
    energy: medium→low
    description: >
      Действие повторяется, но каждый раз тише/слабее/дальше.
      Не петля (та же сила), а эхо — затухающее отражение.
    central_motif_pattern: "первый удар → повторы слабее → тишина"
    hero_object: вода (капля → волны), звук в тоннеле, свет в зеркалах
    beats:
      - section: intro
        intent: "первое действие — звук/движение/свет"
        visual: "объект действует — удар/вспышка/движение"
        imagery_cues: ["капля в воду", "удар", "вспышка"]
        pacing: medium
        scale: medium
      - section: body
        intent: "первое эхо — повтор слабее"
        visual: "второй круг/волна/отражение, но уже слабее"
        imagery_cues: ["вторая волна", "отражение", "тихий повтор"]
        pacing: medium
        scale: wide
      - section: climax
        intent: "эхо затихает — мир стихает"
        visual: "последние отражения, слабые волны, тишина"
        imagery_cues: ["последняя волна", "слабое отражение", "затихание"]
        pacing: slow
        scale: wide
      - section: outro
        intent: "тишина — эхо исчезло"
        visual: "гладкая вода, тихий свет, объект неподвижен"
        imagery_cues: ["гладкая вода", "тишина", "неподвижность"]
        pacing: slow
        scale: wide

  - id: weight
    name: Тяжесть
    emotional_profile: лёгкость → нарастание веса → давление → освобождение
    energy: low→high→low
    description: >
      Мир Becomes тяжелее — объект опускается, пространство сжимается, давление растёт.
      Не боль, а физическое ощущение веса, гравитации, притяжения.
    central_motif_pattern: "гравитация усиливается — мир тяжелеет"
    hero_object: объект на поверхности, вода, свет (становится тяжёлым)
    beats:
      - section: intro
        intent: "лёгкость — объект парит/стоит/свет"
        visual: "объект в равновесии, ничего не давит"
        imagery_cues: ["лёгкий объект", "равновесие", "свет"]
        pacing: slow
        scale: medium
      - section: body
        intent: "тяжесть нарастает — объект начинает опускаться"
        visual: "объект опускается, поверхность прогибается, давит"
        imagery_cues: ["объект опускается", "прогиб", "давление"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "давление на максимуме — мир сжат"
        visual: "объект придавлен, пространство сжато, тяжело"
        imagery_cues: ["придавленный объект", "сжатое пространство", "давление"]
        pacing: slow
        scale: macro
      - section: outro
        intent: "освобождение — вес уходит"
        visual: "объект поднимается, давление уходит, облегчение"
        imagery_cues: ["подъём", "облегчение", "свобода"]
        pacing: medium
        scale: wide

  - id: gathering
    name: Сбор
    emotional_profile: разброс → притяжение → единство
    energy: low→medium
    description: >
      Разрозненные элементы сближаются — не магнит, а естественное притяжение.
      Части находят друг друга, собираются в целое.
    central_motif_pattern: "разрозненность → притяжение → сбор → единство"
    hero_object: капли, лепестки, осколки, пылинки
    beats:
      - section: intro
        intent: "разброс — элементы разъединены"
        visual: "много мелких объектов, разбросаны, не связаны"
        imagery_cues: ["капли на стекле", "лепестки", "осколки"]
        pacing: slow
        scale: wide
      - section: body
        intent: "притяжение — элементы начинают сближаться"
        visual: "капли стекаются, лепестки летят к центру"
        imagery_cues: ["стекание", "притяжение", "сближение"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "сбор — элементы встречаются"
        visual: "момент контакта, слияние, единство"
        imagery_cues: ["столкновение", "слияние", "единство"]
        pacing: medium
        scale: macro
      - section: outro
        intent: "целое — элементы стали одним"
        visual: "новый объект из частей, покой"
        imagery_cues: ["целое", "новый объект", "тишина"]
        pacing: slow
        scale: medium

  - id: unraveling
    name: Распускание
    emotional_profile: целое → разматывание → фрагментация
    energy: medium→low
    description: >
      Объект распускается/расплетается — нити разматываются, ткань рвётся,
      структура теряет форму. Не разрушение, а распускание.
    central_motif_pattern: "нить/ткань/структура → распускание → отдельные фрагменты"
    hero_object: ткань, нить, провода, корни
    beats:
      - section: intro
        intent: "объект цел — структура ясна"
        visual: "целый объект, чёткая структура, ткань/нить/провода"
        imagery_cues: ["ткань", "нить", "структура"]
        pacing: slow
        scale: macro
      - section: body
        intent: "начало распускания — первые нити отпускаются"
        visual: "нити разматываются, ткань рвётся, структура рыхлеет"
        imagery_cues: ["разматывание", "разрыв", "рыхлость"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "массовое распускание — объект теряет форму"
        visual: "нити летят, ткань рвётся, фрагменты разлетаются"
        imagery_cues: ["нити в воздухе", "осколки ткани", "разлет"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "фрагменты — отдельные нити, остатки"
        visual: "отдельные нити, куски ткани, пустота"
        imagery_cues: ["отдельные нити", "остатки", "пустота"]
        pacing: slow
        scale: wide

  - id: resonance
    name: Резонанс
    emotional_profile: тишина → вибрация → нарастание → синхронизация
    energy: low→high→medium
    description: >
      Объект начинает вибрировать — сначала еле заметно, потом всё сильнее,
      пока не найдёт свою частоту. Резонанс как состояние гармонии.
    central_motif_pattern: "вибрация → нарастание → синхронизация → гармония"
    hero_object: стекло, вода, провода, воздух (пылинки)
    beats:
      - section: intro
        intent: "тишина — объект неподвижен"
        visual: "абсолютная неподвижность, тишина"
        imagery_cues: ["неподвижная вода", "чистое стекло", "тишина"]
        pacing: slow
        scale: medium
      - section: body
        intent: "первая вибрация — еле заметная"
        visual: "рябь на воде, дрожь стекла, пылинки шевелятся"
        imagery_cues: ["рябь", "дрожь", "пылинки"]
        pacing: medium
        scale: macro
      - section: climax
        intent: "резонанс — вибрация на максимуме"
        visual: "мир вибрирует, всё синхронизировано"
        imagery_cues: ["максимальная вибрация", "синхронизация", "гармония"]
        pacing: medium
        scale: wide
      - section: outro
        intent: "тишина после резонанса — новый покой"
        visual: "объект стихает, но изменился"
        imagery_cues: ["стихание", "новый покой", "изменённый объект"]
        pacing: slow
        scale: medium

  # ═══════════════════════════════════════════════════════════════════
  # 6. ТЕКСТУРА И МАТЕРИАЛЬНОСТЬ
  # ═══════════════════════════════════════════════════════════════════

  - id: texture_reveal
    name: Обнажение текстуры
    emotional_profile: гладкость → шероховатость → детали → характер
    energy: low
    description: >
      Камера приближается к поверхности — гладкое Becomes шероховатым,
      простое Becomes сложным. Мир в деталях.
    central_motif_pattern: "макро →.detail → характер поверхности"
    hero_object: стена, дерево, камень, ткань, металл
    beats:
      - section: intro
        intent: "общий вид — объект гладкий, простой"
        visual: "объект на расстоянии, поверхность кажется гладкой"
        imagery_cues: ["объект на расстоянии", "光滑", "простой"]
        pacing: slow
        scale: wide
      - section: body
        intent: "приближение — появляются детали"
        visual: "крупный план, текстура Becomes видна"
        imagery_cues: ["крупный план", "текстура", "детали"]
        pacing: slow
        scale: macro
      - section: climax
        intent: "максимум деталей — мир в текстуре"
        visual: "очень крупный план, каждая трещина видна"
        imagery_cues: ["трещины", "ворс", "гранулы", "характер"]
        pacing: slow
        scale: macro
      - section: outro
        intent: "отъём — мы знаем эту поверхность теперь"
        visual: "объект на расстоянии, но мы видим детали мысленно"
        imagery_cues: ["объект", "мы знаем его теперь", "характер"]
        pacing: slow
        scale: medium

  - id: decay
    name: Гниение
    emotional_profile: свежесть → увядание → разложение → трансформация
    energy: low
    description: >
      Объект гниёт/увядает/тлеет — не уродство, а естественный процесс.
      Красота в упадке, характер в разложении.
    central_motif_pattern: "свежее → увядающее → разлагающееся → новая форма"
    hero_object: цветок, фрукт, лист, дерево, ткань
    beats:
      - section: intro
        intent: "свежесть — объект в расцвете"
        visual: "цветок раскрыт, фрукт свеж, ткань чистая"
        imagery_cues: ["раскрытый цветок", "свежий фрукт", "чистая ткань"]
        pacing: slow
        scale: macro
      - section: body
        intent: "начало увядания — первые признаки"
        visual: "лепестки опадают, коричневые края, складки"
        imagery_cues: ["опадающие лепестки", "коричневые края", "складки"]
        pacing: slow
        scale: macro
      - section: climax
        intent: "разложение — объект теряет форму"
        visual: "объект разлагается, ткани Becomes рыхлыми"
        imagery_cues: ["разложение", "рыхлость", "новые текстуры"]
        pacing: slow
        scale: macro
      - section: outro
        intent: "новая форма — из остатков"
        visual: "остатки, но с характером,新的 текстуры"
        imagery_cues: ["остатки", "новые текстуры", "характер"]
        pacing: slow
        scale: medium

  # ═══════════════════════════════════════════════════════════════════
  # 7. АРХИТЕКТУРА И ПРОСТРАНСТВО
  # ═══════════════════════════════════════════════════════════════════

  - id: claustrophobia
    name: Клаустрофобия
    emotional_profile: простор → сжатие → давление → прорыв
    energy: medium→high→low
    description: >
      Пространство сжимается — стены приближаются, потолок опускается,
      проходы Becomes узкими. Не страх, а ощущение давления.
    central_motif_pattern: "пространство сжимается → давление → прорыв"
    hero_object: коридор, комната, окно, дверь
    beats:
      - section: intro
        intent: "простор — пространство открытое"
        visual: "широкий кадр, простор, свет"
        imagery_cues: ["широкий коридор", "открытое пространство", "свет"]
        pacing: slow
        scale: wide
      - section: body
        intent: "сжатие — стены приближаются"
        visual: "коридор Becomes уже, потолок ниже, давит"
        imagery_cues: ["узкий коридор", "низкий потолок", "давление"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "давление на максимуме — тесно"
        visual: "очень узко, тесно, давит"
        imagery_cues: ["теснота", "давление", "стены рядом"]
        pacing: medium
        scale: macro
      - section: outro
        intent: "прорыв — пространство раскрывается"
        visual: "дверь/окно → прорыв наружу, простор"
        imagery_cues: ["прорыв", "свет", "свобода"]
        pacing: medium
        scale: wide

  - id: abyss
    name: Бездна
    emotional_profile: поверхность → глубина → бесконечность
    energy: low
    description: >
      Камера смотрит вниз — в воду, в колодец, в обрыв, в тьму.
      Глубина, которая не заканчивается. Не страх, а трепет.
    central_motif_pattern: "глубина → погружение → бесконечность"
    hero_object: вода, колодец, обрыв, тёмное окно
    beats:
      - section: intro
        intent: "поверхность — мы на краю, смотрим вниз"
        visual: "край, вода внизу, тьма в глубине"
        imagery_cues: ["край", "вода внизу", "тьма"]
        pacing: slow
        scale: wide
      - section: body
        intent: "погружение — камера опускается вниз"
        visual: "камера опускается, глубина Becomes видна"
        imagery_cues: ["погружение", "глубина", "дно не видно"]
        pacing: slow
        scale: medium
      - section: climax
        intent: "бездна — мы в глубине, мир бесконечен"
        visual: "тьма/вода вокруг, нет дна, бесконечность"
        imagery_cues: ["тьма", "бесконечность", "тишина"]
        pacing: slow
        scale: wide
      - section: outro
        intent: "возврат — мы поднимаемся наверх"
        visual: "поверхность Becomes видна, свет вверху"
        imagery_cues: ["свет вверху", "поверхность", "возврат"]
        pacing: slow
        scale: wide

  - id: labyrinth
    name: Лабиринт
    emotional_profile: вход → блуждание → обнаружение → выход/безвыходность
    energy: medium
    description: >
      Объект/камера движется по пространству — повороты, тупики, разветвления.
      Не поиск выхода, а сам процесс блуждания.
    central_motif_pattern: "путь → поворот → разветвление → (не)выход"
    hero_object: коридор, ступеньки, стены, повороты
    beats:
      - section: intro
        intent: "вход — начало пути"
        visual: "дверь/арка/вход, путь виден, но неизвестен"
        imagery_cues: ["вход", "начало пути", "неизвестность"]
        pacing: slow
        scale: medium
      - section: body
        intent: "блуждание — повороты, тупики, разветвления"
        visual: "камера движется, поворачивает, иногда в тупик"
        imagery_cues: ["повороты", "тупики", "разветвления"]
        pacing: medium
        scale: medium
      - section: climax
        intent: "обнаружение — центр лабиринта / главный поворот"
        visual: "камера находит ключевую точку"
        imagery_cues: ["ключевая точка", "центр", "ответ"]
        pacing: medium
        scale: medium
      - section: outro
        intent: "выход или осознание, что лабиринт — дом"
        visual: "выход на свет / поворот обратно / стоп"
        imagery_cues: ["выход", "свет", "или: стоп, лабиринт = дом"]
        pacing: slow
        scale: wide

  - id: ruins
    name: Руины
    emotional_profile: былой блеск → запустение → новая жизнь
    energy: low→medium
    description: >
      Объект/пространство в упадке, но с остатками былого величия.
      Не жалость, а нежность к тому, что осталось. И — новая жизнь среди руин.
    central_motif_pattern: "остатки былого → запустение → проблеск новой жизни"
    hero_object: здание, стена, колонна, окно без стекла
    beats:
      - section: intro
        intent: "былой блеск — объект был красив"
        visual: "архивный кадр / руина, но видна была красота"
        imagery_cues: ["колонна", "арка", "была красота"]
        pacing: slow
        scale: wide
      - section: body
        intent: "запустение — объект в упадке"
        visual: "трещины, мoss, разрушение, пустота"
        imagery_cues: ["трещины", "мoss", "разрушение"]
        pacing: slow
        scale: medium
      - section: climax
        intent: "новая жизнь — цветок/трава/среди руин"
        visual: "зелень пробивается, свет падает, жизнь"
        imagery_cues: ["цветок в трещине", "трава среди камней", "свет"]
        pacing: medium
        scale: macro
      - section: outro
        intent: "гармония — руины и жизнь вместе"
        visual: "объект и природа вместе, новые и старые элементы"
        imagery_cues: ["гармония", "старое и новое", "покой"]
        pacing: slow
        scale: wide

  - id: vertigo
    name: Головокружение
    emotional_profile: покой → кручение → потеря ориентации → возврат
    energy: medium→high→low
    description: >
      Мир Becomes наклонным/вращающимся — не карусель, а потеря горизонта.
      Камера крутится, наклоняется, мир теряет ориентиры.
    central_motif_pattern: "горизонт → наклон → вращение → (не)возврат к горизонту"
    hero_object: комната, дерево, здание, вода (зеркальная)
    beats:
      - section: intro
        intent: "горизонт ровный — мир на месте"
        visual: "ровный горизонт, объект на месте, покой"
        imagery_cues: ["ровный горизонт", "объект на месте", "тишина"]
        pacing: slow
        scale: wide
      - section: body
        intent: "наклон — мир Becomes наклонным"
        visual: "камера наклоняется, мир теряет горизонт"
        imagery_cues: ["наклон", "горизонт кривой", "дезориентация"]
        pacing: medium
        scale: wide
      - section: climax
        intent: "вращение — мир крутится"
        visual: "мир вращается, ориентиры теряются"
        imagery_cues: ["вращение", "ориентиры теряются", "хаос"]
        pacing: fast
        scale: wide
      - section: outro
        intent: "возврат — мир Becomes ровным / не возвращается"
        visual: "горизонт выравнивается / мир продолжает крутиться"
        imagery_cues: ["горизонт", "возврат / нет возврата"]
        pacing: slow
        scale: wide
