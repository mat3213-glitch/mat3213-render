name: Pipeline Finish

on:
  workflow_dispatch:

jobs:
  finish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          YDRIVE_CLIENT_ID: ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN: ${{ secrets.YDRIVE_TOKEN }}
        run: python3 -c "import os,pathlib; p=pathlib.Path.home()/\".config/rclone/rclone.conf\"; p.parent.mkdir(parents=True,exist_ok=True); p.write_text(\"[ydrive]\ntype = yandex\nclient_id = {}\nclient_secret = {}\ntoken = {}\n\".format(os.environ[\"YDRIVE_CLIENT_ID\"],os.environ[\"YDRIVE_CLIENT_SECRET\"],os.environ[\"YDRIVE_TOKEN\"]))"

      - name: Download files from YD
        run: |
          mkdir -p "$HOME/work"
          rclone copy "ydrive:Content factory/CreativeLab/outputs/TASK_pipeline_e2e/" "$HOME/work/"
          rclone copy "ydrive:Content factory/CreativeLab/outputs/TASK_storyboard_md/storyboard_to_md.py" "$HOME/work/"
          ls "$HOME/work/"

      - name: Step 5 - storyboard_to_md
        run: |
          cd "$HOME/work"
          python3 storyboard_to_md.py storyboard_matched.json --title "Hurts in My Heart" --out pipeline_review.md
          cat pipeline_review.md

      - name: Step 7 - pipeline_report
        run: python3 "$GITHUB_WORKSPACE/pipeline_finish_job.py" "$HOME/work"

      - name: Upload to YD
        run: |
          rclone copy "$HOME/work/pipeline_review.md" "ydrive:Content factory/CreativeLab/outputs/TASK_pipeline_finish/"
          rclone copy "$HOME/work/pipeline_report.md" "ydrive:Content factory/CreativeLab/outputs/TASK_pipeline_finish/"
          echo "Done"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-finish
          path: "${{ env.HOME }}/work/pipeline_*.md"
          retention-days: 14

