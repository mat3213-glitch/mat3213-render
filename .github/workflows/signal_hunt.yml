name: signal hunt (litellm + Grok bridge)

# РЕАЛЬНАЯ замена фейк-автономии Grok (он симулировал пуши, см. project_grok_signals).
# Ежедневно на US-IP раннере: litellm-brainstorm кандидатов + мост из ручных Grok-сигналов
# → дедуп против verified_tools → ЯД analyst_queue/pending → диспатч auto_analyst (matrix).
# Заземление: auto_analyst реально клонит/курлит каждый URL → выдуманное отсеивается.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"   # ежедневно 09:00 UTC (~12:00 МСК / 16:00 НСК)

permissions:
  contents: read
  actions: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rclone
        run: sudo apt-get update -qq && sudo apt-get install -y --fix-missing rclone

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Install litellm
        run: pip install -q litellm

      - name: Hunt + bridge + dispatch analyst
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GH_MODELS_TOKEN }}
          GH_DISPATCH_TOKEN:  ${{ secrets.GH_MODELS_TOKEN }}
          LITELLM_GH_MODELS:  ${{ vars.LITELLM_GH_MODELS }}
        run: python3 signal_hunt.py
