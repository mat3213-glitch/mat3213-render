name: grok bridge (signals → analyst)

# МОСТ Grok→auto_analyst (без LLM-brainstorm — он выдумывал, выпилен).
# Берёт source_link из свежего ручного grok_*.json → дедуп vs verified_tools →
# ЯД analyst_queue/pending → диспатч auto_analyst (matrix --from-queue, тред 1653 GROK SCOUT).
# Песочница auto_analyst заземляет: реально клонит/курлит, мёртвое отсеивается.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 20:00 НСК — ПОСЛЕ Grok Task (18:02 НСК) + буфер
                           # на его опоздания (бывает +1ч+), чтобы мост схватил СЕГОДНЯШНИЙ grok_*.json

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rclone
        run: sudo apt-get update -qq && sudo apt-get install -y --fix-missing rclone

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Bridge Grok signals → analyst queue → dispatch
        env:
          GITHUB_TOKEN:      ${{ secrets.GH_MODELS_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python3 signal_hunt.py
