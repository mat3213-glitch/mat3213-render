name: SP Vzrosly Render

# Пересборка клипа «взрослый» (2026-07-05): motion_gen (стилл→parallax / CC→trim) → сборка
# по упорядоченному EDL (storyboard_render_job, полнотрековый audio_start). Движущийся черновик B.

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID — папка render_jobs/<job_id>/ (storyboard.json + src_stills/ + cc_footage/)'
        required: true
        type: string
        default: 'vzrosly_2026-07-05'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg rclone

      - name: Install Python deps
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers opencv-python-headless numpy pillow huggingface_hub librosa soundfile

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Motion gen (stills→parallax / cc→trim)
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: python3 motion_gen.py

      - name: Assemble EDL (storyboard_render_job)
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: python3 storyboard_render_job.py
