name: Plastic Calib (детектор пластмассовости)

on:
  workflow_dispatch:

jobs:
  calib:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing rclone ffmpeg

      - name: Install python deps
        run: |
          pip install -q numpy pillow opencv-python-headless scipy
          # torch+torchvision ОБЯЗАТЕЛЬНО с одного CPU-индекса (иначе torchvision::nms конфликт)
          pip install -q torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -q piq open_clip_torch

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Run plastic_calib.py
        run: python -u plastic_calib.py
