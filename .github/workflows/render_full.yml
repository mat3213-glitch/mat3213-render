name: Render Full Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Render job ID (e.g. 2026-05-31_yaromat_sun)'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-rclone-fonts-${{ runner.os }}-v1

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg rclone fonts-liberation fonts-liberation2 || \
          sudo apt-get install -y --fix-missing ffmpeg rclone fonts-liberation
          if [ ! -f /usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf ]; then
            sudo mkdir -p /usr/share/fonts/truetype/liberation2
            sudo ln -sf /usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf \
              /usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf
          fi

      - name: Install Python deps
        run: pip install Pillow numpy

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"
          echo "rclone config written"

      - name: Render
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: python -u render_full_job.py

      - name: Write error status on failure
        if: failure()
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          rclone rcat "ydrive:Content factory/cloud_io/render_jobs/$JOB_ID/status.txt" <<< "error: workflow failed" || true
