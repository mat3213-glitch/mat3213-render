name: whisper-stage-test

# Гейт-артефакт этапа whisperx→director (Ф1b): реальный whisperx + snap_cuts_to_vocals
# на треке → лист резки (куда лягут резы на спетых словах). НЕ рендер. Ручной запуск.
on:
  workflow_dispatch:
    inputs:
      track:
        description: "трек на ЯД (rel от 'Content factory/')"
        default: "music post/моя музыка/старая/yaromat - hurts in my heart/yaromat - hurts in my heart.flac"

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libsndfile1
          pip install --quiet whisperx librosa requests
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone (ЯД / ydrive)
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [ydrive]
          type = yandex
          client_id = ${YDRIVE_CLIENT_ID}
          client_secret = ${YDRIVE_CLIENT_SECRET}
          token = ${YDRIVE_TOKEN}
          EOF

      - name: Pull track + run whisper stage
        working-directory: screenplay_pipeline
        env:
          TRACK: ${{ inputs.track }}   # через env (анти shell-injection, урок B-5)
          FALLBACK: "music post/моя музыка/старая/yaromat - hurts in my heart/yaromat - hurts in my heart.flac"
        run: |
          rclone copyto "ydrive:Content factory/${TRACK}" ./track_audio 2>/dev/null || \
            rclone copyto "ydrive:Content factory/${FALLBACK}" ./track_audio
          python whisper_stage_test.py ./track_audio

      - name: Upload cut-sheet to ЯД (гейт-папка)
        working-directory: screenplay_pipeline
        run: |
          DST="ydrive:Content factory/cloud_io/preview/2026-07-10_supervision_creative/04_whisper_stage_GATE"
          rclone copyto whisper_cut_sheet.md "$DST/whisper_cut_sheet.md"
          rclone copyto whisper_stage.json  "$DST/whisper_stage.json"
