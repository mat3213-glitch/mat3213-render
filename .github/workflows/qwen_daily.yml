name: Qwen Daily Gen

# Ежедневная генерация Qwen (фото+видео) → ЯД qwen_pool/<дата>/ + TG-уведомление.
# Цель: держать сессию Qwen в рабочем состоянии и наполнять библиотеку релевантным материалом.
# ВАЖНО: cron включаем ТОЛЬКО после зелёной ручной пробы (проверка, пускает ли Qwen US-IP раннера).
on:
  workflow_dispatch:
    inputs:
      n_img:
        description: 'Сколько картинок (проба = 1)'
        default: '1'
      n_vid:
        description: 'Сколько видео (проба = 0, боевой = 2)'
        default: '0'
      ratio:
        description: 'Соотношение сторон'
        default: '16:9'
      vid_prompts_custom:
        description: 'Кастомные видео-промпты (|||-разделитель), для прицельной генерации'
        default: ''
  schedule:
    - cron: '43 */5 * * *'   # каждые 5ч (~4-5/день под аккаунт-квоту Qwen); целевой заказ-пул 2026-07-11

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install rclone
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing rclone

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Pull Qwen session from ЯД
        run: rclone copyto "ydrive:Content factory/cloud_io/qwen_ci/qwen_session.json" qwen/qwen_session.json

      - name: Install Playwright
        run: |
          pip install -q requests playwright
          python -m playwright install --with-deps chromium

      - name: Generate (pool_daily — Qwen, перенацелен 2026-07-11)
        env:
          ENGINE: qwen
          GATE: "ydrive:Content factory/cloud_io/pool_gate/adult_dnb_2026-07-11"
          LIMIT: '1'
        run: python -u pool_daily.py
