name: VeoFree Daily Gen

# Ежедневная генерация VeoFree (t2v) → ЯД veofree_pool/<дата>/ + TG.
# Цель: держать токен/доступ VeoFree тёплым и наполнять библиотеку видео.
# cron включаем ПОСЛЕ зелёной ручной пробы.
on:
  workflow_dispatch:
    inputs:
      n_vid:
        description: 'Сколько видео (боевой = 1 — VeoFree лимит 1ген/IP, больше = трата раннер-минут зря)'
        default: '1'
  schedule:
    - cron: '17 * * * *'   # каждый час (24/день), :17 чтобы уйти от пиковой очереди кронов в :00 (yaromat 2026-07-03: было 2 видео/3ч — исправлено на 1 видео/1ч)

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install rclone
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing rclone
      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"
      - name: Install Playwright
        run: |
          pip install -q requests playwright
          python -m playwright install --with-deps chromium
      - name: Generate (pool_daily — целевой заказ-пул, перенацелен 2026-07-11)
        env:
          ENGINE: veofree
          GATE: "ydrive:Content factory/cloud_io/pool_gate/adult_dnb_2026-07-11"
          LIMIT: '1'
        run: python -u pool_daily.py
