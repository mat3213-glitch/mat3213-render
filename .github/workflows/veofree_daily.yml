name: VeoFree Daily Gen

# Ежедневная генерация VeoFree (t2v) → ЯД veofree_pool/<дата>/ + TG.
# Цель: держать токен/доступ VeoFree тёплым и наполнять библиотеку видео.
# cron включаем ПОСЛЕ зелёной ручной пробы.
on:
  workflow_dispatch:
    inputs:
      n_vid:
        description: 'Сколько видео (проба = 1, боевой = 2)'
        default: '1'
  schedule:
    - cron: '17 */3 * * *'   # каждые 3 часа (8/день), :17 чтобы уйти от пиковой очереди кронов в :00

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install rclone
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing rclone
      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"
      - name: Install Playwright
        run: |
          pip install -q requests playwright
          python -m playwright install --with-deps chromium
      - name: Generate (VeoFree daily)
        env:
          N_VID:               ${{ inputs.n_vid || '2' }}
          CLOUDFLARE_WORKER:   ${{ secrets.CLOUDFLARE_WORKER }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID:          ${{ secrets.SCOUT_CHAT_ID }}
          TG_THREAD_ID:        '5'
        run: python -u veofree_daily.py
