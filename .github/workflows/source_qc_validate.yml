name: source-qc-validate

# Регресс-проверка двухфакторного пре-гейта source_qc (L4): часы НЕ реджектятся,
# силуэты проходят как фигуры. Ручной запуск.
on:
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libgl1 libglib2.0-0
          pip install --quiet supervision ultralytics huggingface_hub numpy
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone (ЯД / ydrive)
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [ydrive]
          type = yandex
          client_id = ${YDRIVE_CLIENT_ID}
          client_secret = ${YDRIVE_CLIENT_SECRET}
          token = ${YDRIVE_TOKEN}
          EOF

      - name: Validate source_qc
        working-directory: screenplay_pipeline
        run: python source_qc_validate.py
