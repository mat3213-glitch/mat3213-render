name: mimo chat bot

# Облачный бот @ghmimo_bot без бука.
# CF Worker (mat3213-cloudbot /mimo) получает TG-вебхук → dispatches этот workflow →
# mimo headless считает задачу → результат уходит в TG через CF /bot<token>/sendMessage.
# Память треда: ydrive:Content factory/cloud_io/mimo_bot/threads.json
# Secrets нужны в render-репо: YDRIVE_*, CLOUDFLARE_WORKER, MIMO_BOT_TOKEN

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: "TG chat_id"
        required: true
        type: string
      thread_id:
        description: "TG message_thread_id (пусто = нет)"
        required: false
        default: ""
        type: string
      message:
        description: "Сообщение пользователя"
        required: true
        type: string
      thread_key:
        description: "Ключ треда для памяти (chat_id:thread_id)"
        required: true
        type: string
      action:
        description: "chat (default) | clear (сброс контекста треда)"
        required: false
        default: "chat"
        type: string

permissions:
  contents: read
  actions: write   # mimo может dispatch рендер-воркфлоу в ЭТОМ репо (белый список в RULES)

jobs:
  chat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone + ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y --fix-missing rclone ffmpeg

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      # ── ВЕТКА CLEAR: сбросить контекст треда ─────────────────────────────────
      - name: Clear thread context
        if: ${{ inputs.action == 'clear' }}
        env:
          CLOUDFLARE_WORKER: ${{ secrets.CLOUDFLARE_WORKER }}
          MIMO_BOT_TOKEN:    ${{ secrets.MIMO_BOT_TOKEN }}
          CHAT_ID:           ${{ inputs.chat_id }}
          THREAD_ID:         ${{ inputs.thread_id }}
          THREAD_KEY:        ${{ inputs.thread_key }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, subprocess, urllib.request

          import re
          key = os.environ["THREAD_KEY"]
          # per-thread файл (фикс гонки): один тред = один файл, удаляем только его
          def safe_key(k): return re.sub(r'[:/ ]+', '_', k).strip('_')
          remote = f"ydrive:Content factory/cloud_io/mimo_bot/threads/{safe_key(key)}.json"
          subprocess.run(["rclone", "delete", remote], capture_output=True)

          cf = os.environ.get("CLOUDFLARE_WORKER", "").rstrip("/")
          token = os.environ.get("MIMO_BOT_TOKEN", "")
          chat_id = os.environ.get("CHAT_ID", "")
          thread_id = os.environ.get("THREAD_ID", "")
          body = {"chat_id": chat_id, "text": "🆕 Контекст сброшен. Новая задача."}
          if thread_id:
              body["message_thread_id"] = int(thread_id)
          req = urllib.request.Request(
              f"{cf}/bot{token}/sendMessage",
              data=json.dumps(body).encode(),
              headers={"Content-Type": "application/json", "User-Agent": "curl/7.88.1"}
          )
          try:
              urllib.request.urlopen(req, timeout=30)
              print("TG: контекст сброшен, ответ отправлен")
          except Exception as e:
              print(f"TG sendMessage err: {e}")
          PY

      # ── ВЕТКА CHAT: запустить mimo ────────────────────────────────────────────
      - name: Restore mimo binary from ydrive
        if: ${{ inputs.action != 'clear' }}
        run: |
          set -e
          mkdir -p "$HOME/.mimocode/bin" "$HOME/.local/share/mimocode"
          rclone copyto "ydrive:Content factory/cloud_io/mimo_ci/mimo" "$HOME/.mimocode/bin/mimo"
          chmod +x "$HOME/.mimocode/bin/mimo"
          rclone copyto "ydrive:Content factory/cloud_io/mimo_ci/installation_id" \
            "$HOME/.local/share/mimocode/installation_id"
          rclone copyto "ydrive:Content factory/cloud_io/mimo_ci/mimo-free-client" \
            "$HOME/.local/share/mimocode/mimo-free-client"

      - name: Build prompt with thread context
        if: ${{ inputs.action != 'clear' }}
        env:
          THREAD_KEY: ${{ inputs.thread_key }}
          MESSAGE:    ${{ inputs.message }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, subprocess

          HIST_TURNS = 6
          HIST_ANS_CHARS = 1200
          SB = "ydrive:Content factory/cloud_io/mimo_sandbox"

          # Впрыск на КАЖДЫЙ ход: конституция + срез памяти проекта + личная память mimo.
          def yd_read(remote, default=""):
              p = pathlib.Path("/tmp/" + remote.split("/")[-1])
              r = subprocess.run(["rclone", "copyto", remote, str(p)], capture_output=True)
              return p.read_text(encoding="utf-8", errors="replace") if (r.returncode == 0 and p.exists()) else default

          rules   = yd_read(f"{SB}/RULES.md", "(RULES.md не найден — действуй осторожно, только в песочнице)")
          brief   = yd_read(f"{SB}/PROJECT_BRIEF.md", "")
          my_mem  = yd_read(f"{SB}/MEMORY/notes.md", "")
          # защита от раздувания промпта: вшиваем только ХВОСТ памяти (последние 60 строк)
          my_mem = "\n".join(my_mem.strip().splitlines()[-60:])

          PREAMBLE = (
              rules
              + "\n\n=== СРЕЗ ПАМЯТИ ПРОЕКТА ===\n" + brief
              + "\n\n=== ТВОЯ ЛИЧНАЯ ПАМЯТЬ (mimo_sandbox/MEMORY/notes.md) ===\n" + (my_mem or "(пусто)")
              + "\n\nНАПОМИНАНИЕ: пиши/удаляй ТОЛЬКО в mimo_sandbox/ и /tmp; НЕ commit/push (это тимлид).\n"
              "Если в сообщении есть '/close' — выполни ритуал закрытия из RULES (рефлексия → запись в свою\n"
              "память notes.md через rclone → итог в ответе). После полезной работы дописывай вывод в notes.md.\n"
          )

          key = os.environ["THREAD_KEY"]
          message = os.environ["MESSAGE"]

          # per-thread история (фикс гонки): читаем только файл этого треда
          import re
          def safe_key(k): return re.sub(r'[:/ ]+', '_', k).strip('_')
          th_remote = f"ydrive:Content factory/cloud_io/mimo_bot/threads/{safe_key(key)}.json"
          th_local = f"/tmp/_th_{safe_key(key)}.json"
          subprocess.run(["rclone", "copyto", th_remote, th_local], capture_output=True)
          hist = []
          if pathlib.Path(th_local).exists():
              try: hist = json.loads(pathlib.Path(th_local).read_text())[-HIST_TURNS:]
              except: pass

          parts = [PREAMBLE]
          if hist:
              parts.append("\n=== Контекст прошлых шагов этого треда (для справки) ===")
              for i, turn in enumerate(hist, 1):
                  ans = (turn.get("a") or "")[:HIST_ANS_CHARS]
                  parts.append(f"[{i}] Задача: {turn.get('q', '')}\n    Результат: {ans}")
              parts.append("=== конец контекста ===\n")
          parts.append(f"ТЕКУЩАЯ ЗАДАЧА:\n{message}")
          prompt = "\n".join(parts)

          pathlib.Path("/tmp/prompt.txt").write_text(prompt, encoding="utf-8")
          print(f"Промпт: {len(prompt)} симв., история: {len(hist)} шагов")
          PY

      - name: Run mimo
        if: ${{ inputs.action != 'clear' }}
        id: run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # для `gh workflow run` рендеров (белый список в RULES)
        run: |
          MIMO="$HOME/.mimocode/bin/mimo"
          mkdir -p /tmp/mimorun && cd /tmp/mimorun
          PROMPT=$(cat /tmp/prompt.txt)
          START=$(date +%s)
          timeout 1500 "$MIMO" run --pure --dangerously-skip-permissions "$PROMPT" \
            > out.txt 2> err.txt </dev/null
          RC=$?
          END=$(date +%s)
          sed -r 's/\x1B\[[0-9;]*[A-Za-z]//g' out.txt | grep -vE '^\s*>' | sed '/^\s*$/d' > clean.txt
          echo "RC=$RC ELAPSED=$((END-START))"
          echo "rc=$RC"                 >> "$GITHUB_OUTPUT"
          echo "elapsed=$((END-START))" >> "$GITHUB_OUTPUT"

      # Детерминированный /close: пишем рефлексию в память mimo САМИ (не полагаясь на free-LLM)
      - name: Persist /close reflection
        if: ${{ inputs.action != 'clear' && contains(inputs.message, '/close') }}
        run: |
          python3 - <<'PY'
          import subprocess, os, datetime, pathlib
          clean = ""
          p = pathlib.Path("/tmp/mimorun/clean.txt")
          if p.exists():
              clean = p.read_text(encoding="utf-8", errors="replace").strip()
          rnotes = "ydrive:Content factory/cloud_io/mimo_sandbox/MEMORY/notes.md"
          lnotes = "/tmp/_notes_close.md"
          subprocess.run(["rclone", "copyto", rnotes, lnotes], capture_output=True)
          utc = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          entry = f"- [{utc}] /close: " + " ".join(clean[:200].split())
          lines = pathlib.Path(lnotes).read_text(encoding="utf-8").splitlines() if pathlib.Path(lnotes).exists() else []
          ins = 0
          for i, l in enumerate(lines):
              if l.lstrip().startswith(">"):   # после строки-подсказки (свежее сверху)
                  ins = i + 1
                  break
          lines.insert(ins, entry)
          pathlib.Path(lnotes).write_text("\n".join(lines) + "\n", encoding="utf-8")
          subprocess.run(["rclone", "copyto", lnotes, rnotes], capture_output=True)
          print(f"/close reflection persisted: {entry[:80]}")
          PY

      - name: Save context + send result to TG
        if: ${{ inputs.action != 'clear' }}
        env:
          CLOUDFLARE_WORKER: ${{ secrets.CLOUDFLARE_WORKER }}
          MIMO_BOT_TOKEN:    ${{ secrets.MIMO_BOT_TOKEN }}
          CHAT_ID:           ${{ inputs.chat_id }}
          THREAD_ID:         ${{ inputs.thread_id }}
          THREAD_KEY:        ${{ inputs.thread_key }}
          MESSAGE:           ${{ inputs.message }}
          RC:                ${{ steps.run.outputs.rc }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, subprocess, urllib.request

          key = os.environ["THREAD_KEY"]
          message = os.environ["MESSAGE"]
          rc = os.environ.get("RC") or "1"
          cf = os.environ.get("CLOUDFLARE_WORKER", "").rstrip("/")
          token = os.environ.get("MIMO_BOT_TOKEN", "")
          chat_id = os.environ.get("CHAT_ID", "")
          thread_id = os.environ.get("THREAD_ID", "")

          clean = pathlib.Path("/tmp/mimorun/clean.txt")
          err   = pathlib.Path("/tmp/mimorun/err.txt")
          text = clean.read_text(encoding="utf-8", errors="replace").strip() if clean.exists() else ""
          ok = (rc == "0") and bool(text)

          if ok:
              resp = text
              # per-thread запись (фикс гонки): читаем/пишем только файл этого треда
              import re
              def safe_key(k): return re.sub(r'[:/ ]+', '_', k).strip('_')
              th_remote = f"ydrive:Content factory/cloud_io/mimo_bot/threads/{safe_key(key)}.json"
              th_local = f"/tmp/_th_{safe_key(key)}.json"
              subprocess.run(["rclone", "copyto", th_remote, th_local], capture_output=True)
              hist = []
              if pathlib.Path(th_local).exists():
                  try: hist = json.loads(pathlib.Path(th_local).read_text())
                  except: pass
              hist.append({"q": message, "a": resp[:1200]})
              hist = hist[-6:]
              pathlib.Path(th_local).write_text(json.dumps(hist, ensure_ascii=False))
              subprocess.run(["rclone", "copyto", th_local, th_remote], capture_output=True)
          else:
              err_text = (err.read_text(errors="replace")[:300] if err.exists() else "")
              resp = f"❌ gh-mimo: rc={rc} {err_text}".strip()

          # Отправляем в TG (чанками по 3900 симв.)
          for i in range(0, max(len(resp), 1), 3900):
              chunk = resp[i:i + 3900] or "(пусто)"
              body = {"chat_id": chat_id, "text": chunk}
              if thread_id:
                  body["message_thread_id"] = int(thread_id)
              req = urllib.request.Request(
                  f"{cf}/bot{token}/sendMessage",
                  data=json.dumps(body).encode(),
                  headers={"Content-Type": "application/json", "User-Agent": "curl/7.88.1"}
              )
              try:
                  urllib.request.urlopen(req, timeout=30)
                  print(f"TG ok (chunk {i // 3900 + 1})")
              except Exception as e:
                  print(f"TG err: {e}")
          PY

      # Краткая версия ответа голосом (edge-tts ru → ogg → sendVoice). Не критично: на ошибке молчим.
      - name: Send voice reply
        if: ${{ inputs.action != 'clear' && steps.run.outputs.rc == '0' }}
        env:
          CLOUDFLARE_WORKER: ${{ secrets.CLOUDFLARE_WORKER }}
          MIMO_BOT_TOKEN:    ${{ secrets.MIMO_BOT_TOKEN }}
          CHAT_ID:           ${{ inputs.chat_id }}
          THREAD_ID:         ${{ inputs.thread_id }}
        run: |
          pip install -q edge-tts requests || { echo "pip fail — пропуск голоса"; exit 0; }
          python3 - <<'PY'
          import os, asyncio, subprocess
          try:
              text = open("/tmp/mimorun/clean.txt", encoding="utf-8").read().strip()
          except Exception:
              text = ""
          if not text:
              print("нет текста для голоса"); raise SystemExit(0)
          # краткая версия: ~400 симв, обрезка по концу предложения
          short = text
          if len(text) > 400:
              short = text[:400]
              cut = max(short.rfind("."), short.rfind("!"), short.rfind("?"), short.rfind("…"))
              short = short[:cut + 1] if cut > 100 else short
          try:
              import edge_tts
              asyncio.run(edge_tts.Communicate(short, "ru-RU-SvetlanaNeural").save("/tmp/reply.mp3"))
              subprocess.run(["ffmpeg", "-y", "-i", "/tmp/reply.mp3", "-c:a", "libopus",
                              "-b:a", "32k", "/tmp/reply.ogg"], check=True, capture_output=True)
          except Exception as e:
              print(f"TTS/ffmpeg err: {e}"); raise SystemExit(0)
          try:
              import requests
              # GH-раннер в США → api.telegram.org НЕ заблокирован, шлём multipart НАПРЯМУЮ
              # (CF Worker нужен только с RU-IP бука; здесь он лишний и давал 403 на multipart).
              data = {"chat_id": os.environ["CHAT_ID"]}
              tid = os.environ.get("THREAD_ID", "").strip()
              if tid:
                  data["message_thread_id"] = int(tid)
              with open("/tmp/reply.ogg", "rb") as fh:
                  r = requests.post(
                      f"https://api.telegram.org/bot{os.environ['MIMO_BOT_TOKEN']}/sendVoice",
                      data=data, files={"voice": ("reply.ogg", fh, "audio/ogg")}, timeout=60)
              print(f"sendVoice: {r.status_code} {r.text[:150]}")
          except Exception as e:
              print(f"sendVoice err: {e}")
          PY
