name: Render Blend Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Render job ID (e.g. 2026-05-30_ty_prosti)'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg rclone

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          python3 -c "
import os, pathlib
cfg = '[ydrive]\ntype = yandex\nclient_id = {}\nclient_secret = {}\ntoken = {}\n'.format(
    os.environ['YDRIVE_CLIENT_ID'],
    os.environ['YDRIVE_CLIENT_SECRET'],
    os.environ['YDRIVE_TOKEN'],
)
p = pathlib.Path.home() / '.config/rclone/rclone.conf'
p.parent.mkdir(parents=True, exist_ok=True)
p.write_text(cfg)
print('rclone config written')
"

      - name: Render
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: python -u render_job.py
