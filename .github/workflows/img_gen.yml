name: Image Gen (CF Workers AI)

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID — папка render_jobs/<JOB_ID>/ с gen_job.json на ЯД'
        required: true

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing rclone
          pip install -q requests

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Run img_gen_job.py
        env:
          JOB_ID: ${{ inputs.job_id }}
          IMG_WORKER_URL: https://yaromat-img.mat3213.workers.dev
          IMG_WORKER_SECRET: ${{ secrets.IMG_WORKER_SECRET }}
        run: python -u img_gen_job.py

      - name: Write error status on failure
        if: failure()
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          rclone rcat "ydrive:Content factory/cloud_io/render_jobs/$JOB_ID/status.txt" \
            <<< "error: workflow failed" || true
