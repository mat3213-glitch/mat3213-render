name: Parallax Planes

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID — папка render_jobs/<job_id>/ со стиллами и gen_job.json на ЯД'
        required: true
        type: string
      stills:
        description: 'Подмножество стиллов через запятую (опц.)'
        required: false
        type: string
      amp:
        description: 'Амплитуда параллакса (доля кадра; дефолт 0.10 = макс. выраженно)'
        required: false
        type: string

jobs:
  parallax:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg rclone

      - name: Install Python deps
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers opencv-python-headless numpy pillow huggingface_hub

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Run parallax generator
        env:
          JOB_ID: ${{ inputs.job_id }}
          STILLS: ${{ inputs.stills }}
          PARALLAX_AMP: ${{ inputs.amp }}
        run: |
          ARGS=(--job-id "$JOB_ID")
          if [ -n "$STILLS" ]; then ARGS+=(--stills "$STILLS"); fi
          python -u parallax_planes.py "${ARGS[@]}"

      - name: Write error status on failure
        if: failure()
        run: |
          rclone rcat "ydrive:Content factory/cloud_io/render_jobs/${{ inputs.job_id }}/status.txt" \
            <<< "error: workflow failed" || true
